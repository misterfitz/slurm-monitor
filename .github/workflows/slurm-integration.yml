name: Slurm Integration

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday 6am UTC
  workflow_dispatch:

jobs:
  slurm-test:
    name: Slurm ${{ matrix.slurm-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        slurm-version: ['24.11', '25.05']

    services:
      mysql:
        image: mariadb:10
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: slurm_acct_db
          MYSQL_USER: slurm
          MYSQL_PASSWORD: slurm
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Slurm test container
        run: |
          # Use a minimal Slurm container for CLI testing
          # We test that our script parses squeue/sprio/sshare output correctly
          docker pull giovtorres/docker-slurm:${{ matrix.slurm-version }}.latest || \
          docker pull giovtorres/docker-slurm:latest

      - name: Start Slurm cluster
        run: |
          docker run -d --name slurm-test \
            -e SLURM_CONF=/etc/slurm/slurm.conf \
            giovtorres/docker-slurm:${{ matrix.slurm-version }}.latest || \
          docker run -d --name slurm-test \
            giovtorres/docker-slurm:latest

          # Wait for Slurm to start
          for i in $(seq 1 30); do
            if docker exec slurm-test sinfo 2>/dev/null | grep -q idle; then
              echo "Slurm is ready"
              break
            fi
            echo "Waiting for Slurm... ($i/30)"
            sleep 2
          done

      - name: Copy monitor script into container
        run: |
          docker cp scripts/slurm-monitor.py slurm-test:/usr/local/bin/slurm-monitor
          docker exec slurm-test chmod +x /usr/local/bin/slurm-monitor

      - name: Test basic output
        run: |
          output=$(docker exec slurm-test python3 /usr/local/bin/slurm-monitor)
          echo "Basic output: $output"
          echo "$output" | grep -q "R:" || { echo "FAIL: missing R: in output"; exit 1; }
          echo "$output" | grep -q "P:" || { echo "FAIL: missing P: in output"; exit 1; }

      - name: Test JSON output
        run: |
          output=$(docker exec slurm-test python3 /usr/local/bin/slurm-monitor --json)
          echo "JSON output: $output"
          echo "$output" | python3 -c "import sys, json; d=json.load(sys.stdin); assert 'running' in d; assert 'pending' in d; print('JSON valid')"

      - name: Test user query
        run: |
          output=$(docker exec slurm-test python3 /usr/local/bin/slurm-monitor -u slurm --json)
          echo "User output: $output"
          echo "$output" | python3 -c "import sys, json; json.load(sys.stdin); print('User JSON valid')"

      - name: Test color output
        run: |
          output=$(docker exec slurm-test python3 /usr/local/bin/slurm-monitor --color)
          echo "Color output: $output"
          # Color output should have tmux codes
          echo "$output" | grep -q '\[' || echo "Note: no color codes (no user specified, expected)"

      - name: Test long format
        run: |
          output=$(docker exec slurm-test python3 /usr/local/bin/slurm-monitor --long)
          echo "Long output: $output"
          echo "$output" | grep -q "R:" || { echo "FAIL: missing R: in long output"; exit 1; }

      - name: Verify Slurm version
        run: |
          version=$(docker exec slurm-test sinfo --version)
          echo "Slurm version: $version"

      - name: Cleanup
        if: always()
        run: docker rm -f slurm-test 2>/dev/null || true
