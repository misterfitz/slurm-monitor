name: Slurm Integration

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday 6am UTC
  workflow_dispatch:

jobs:
  slurm-test:
    name: Slurm (real cluster)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Slurm image from misterfitz/docker-slurm
        run: |
          git clone --depth 1 https://github.com/misterfitz/docker-slurm.git /tmp/docker-slurm
          cd /tmp/docker-slurm
          docker compose build build-full-root

      - name: Start Slurm container
        run: |
          cd /tmp/docker-slurm
          # Run with a long-lived command so container stays up
          docker run -d --name slurm-test \
            --hostname linux \
            nathanhess/slurm:full-root \
            bash -c '/etc/startup.sh && tail -f /dev/null'

          # Wait for Slurm daemons to be ready
          echo "Waiting for Slurm..."
          for i in $(seq 1 30); do
            if docker exec slurm-test sinfo 2>/dev/null | grep -qE "idle|alloc|mix"; then
              echo "Slurm is ready!"
              docker exec slurm-test sinfo
              docker exec slurm-test sinfo --version
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "FAIL: Slurm did not start in time"
              docker logs slurm-test
              exit 1
            fi
            echo "  attempt $i/30..."
            sleep 3
          done

      - name: Copy monitor script into container
        run: |
          docker cp scripts/slurm-monitor.py slurm-test:/usr/local/bin/slurm-monitor
          docker exec slurm-test chmod +x /usr/local/bin/slurm-monitor

      - name: Test basic output
        run: |
          output=$(docker exec slurm-test python3 /usr/local/bin/slurm-monitor)
          echo "Basic: '$output'"
          echo "$output" | grep -q "R:" || { echo "FAIL: missing R:"; exit 1; }
          echo "$output" | grep -q "P:" || { echo "FAIL: missing P:"; exit 1; }
          echo "PASS"

      - name: Test JSON output
        run: |
          output=$(docker exec slurm-test python3 /usr/local/bin/slurm-monitor --json)
          echo "JSON: $output"
          echo "$output" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert 'running' in d, 'missing running'
          assert 'pending' in d, 'missing pending'
          assert isinstance(d['running'], int), 'running not int'
          assert isinstance(d['pending'], int), 'pending not int'
          print('PASS: running=%d pending=%d total=%d' % (d['running'], d['pending'], d['total']))
          "

      - name: Submit test jobs and verify monitoring
        run: |
          # Submit some actual jobs so we have running + pending
          docker exec slurm-test bash -c '
            for i in $(seq 1 5); do
              sbatch --wrap="sleep 300" --job-name="test_$i" 2>/dev/null
            done
            sleep 3
            squeue
          '

          # Now test with real jobs
          output=$(docker exec slurm-test python3 /usr/local/bin/slurm-monitor --json)
          echo "After jobs: $output"
          echo "$output" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          total = d['running'] + d['pending']
          assert total > 0, 'Expected jobs after submission, got 0'
          print('PASS: %d total jobs detected' % total)
          "

      - name: Test long format with jobs
        run: |
          output=$(docker exec slurm-test python3 /usr/local/bin/slurm-monitor --long)
          echo "Long: '$output'"
          echo "$output" | grep -q "R:" || { echo "FAIL"; exit 1; }
          echo "PASS"

      - name: Test color output
        run: |
          output=$(docker exec slurm-test python3 /usr/local/bin/slurm-monitor --color)
          echo "Color: '$output'"
          echo "PASS"

      - name: Test user query
        run: |
          output=$(docker exec slurm-test python3 /usr/local/bin/slurm-monitor -u root --json)
          echo "User: $output"
          echo "$output" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print('PASS: user data = %s' % d.get('user'))
          "

      - name: Test watch mode (single iteration)
        run: |
          # Run with timeout to verify it doesn't crash
          timeout 5 docker exec slurm-test python3 /usr/local/bin/slurm-monitor --watch -r 2 || true
          echo "PASS: watch mode ran without crash"

      - name: Print Slurm version for matrix reference
        run: |
          docker exec slurm-test sinfo --version
          docker exec slurm-test squeue --version

      - name: Cleanup
        if: always()
        run: docker rm -f slurm-test 2>/dev/null || true
